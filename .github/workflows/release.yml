name: Build and Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release_macos:
    name: Release macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag points to main
        if: github.event_name == 'push'
        run: |
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} points to a commit on origin/main."
          else
            echo "::error::Tag ${GITHUB_REF_NAME} does not point to a commit on origin/main."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        run: |
          npm install --global pnpm@10
          pnpm --version

      - name: Sync package version from release tag
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use semantic version format (for example: v1.2.3)."
            exit 1
          fi

          RELEASE_VERSION="${TAG_NAME#v}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"

          if [ "$CURRENT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Adjusting package version for CI build: $CURRENT_VERSION -> $RELEASE_VERSION"
            npm pkg set version="$RELEASE_VERSION"
          else
            echo "package.json version already matches tag: $CURRENT_VERSION"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preflight packaged build validation
        run: |
          pnpm run build
          CSC_IDENTITY_AUTO_DISCOVERY=false pnpm exec electron-builder --dir --mac --arm64 --publish never

      - name: Check macOS signing and notarization secrets
        env:
          HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE != '' }}
          HAS_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD != '' }}
          HAS_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD != '' }}
          HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
          HAS_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
          HAS_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}
        run: |
          echo "MACOS_CERTIFICATE=$HAS_MACOS_CERTIFICATE"
          echo "MACOS_CERTIFICATE_PASSWORD=$HAS_MACOS_CERTIFICATE_PASSWORD"
          echo "KEYCHAIN_PASSWORD=$HAS_KEYCHAIN_PASSWORD"
          echo "APPLE_ID=$HAS_APPLE_ID"
          echo "APPLE_APP_SPECIFIC_PASSWORD=$HAS_APPLE_APP_SPECIFIC_PASSWORD"
          echo "APPLE_TEAM_ID=$HAS_APPLE_TEAM_ID"

          if [ "$HAS_MACOS_CERTIFICATE" != "true" ] || [ "$HAS_MACOS_CERTIFICATE_PASSWORD" != "true" ] || [ "$HAS_KEYCHAIN_PASSWORD" != "true" ]; then
            echo "::error::The macOS signing certificate secrets are incomplete."
            exit 1
          fi

          if [ "$HAS_APPLE_ID" != "true" ] || [ "$HAS_APPLE_APP_SPECIFIC_PASSWORD" != "true" ] || [ "$HAS_APPLE_TEAM_ID" != "true" ]; then
            echo "::error::The Apple notarization secrets are incomplete. Expected APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID."
            exit 1
          fi

      - name: Import Code Signing Certificate (macOS)
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          printf '%s' "$CERTIFICATE_BASE64" | tr -d '\r\n ' | base64 --decode > $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build package and optionally publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          PUBLISH_MODE="never"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            PUBLISH_MODE="always"
            RELEASE_ID=""
            if gh release view "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              RELEASE_ID="$(gh release view "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" --json id --jq '.id')"
            fi

            if [ -n "$RELEASE_ID" ]; then
              echo "Cleaning existing assets from release ${GITHUB_REF_NAME} (id: $RELEASE_ID)"
              gh release view "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" --json assets --jq '.assets[] | "\(.id)\t\(.name)"' \
                | while IFS=$'\t' read -r asset_id asset_name; do
                    if [ -z "$asset_id" ]; then
                      continue
                    fi
                    echo "Deleting existing release asset: $asset_name"
                    gh api -X DELETE "repos/${{ github.repository }}/releases/assets/$asset_id" >/dev/null
                  done
            else
              echo "No existing release found for ${GITHUB_REF_NAME}; skipping asset cleanup."
            fi
          fi

          echo "electron-builder publish mode: $PUBLISH_MODE"
          pnpm run build
          pnpm exec electron-builder --mac --arm64 --publish "$PUBLISH_MODE"

      - name: Locate built app (macOS)
        id: locate_macos_app
        run: |
          APP_PATH=$(find dist -maxdepth 3 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find a built .app bundle in dist."
            find dist -maxdepth 3 -print || true
            exit 1
          fi

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app bundle at $APP_PATH"

      - name: Verify macOS codesign and Gatekeeper state
        run: |
          codesign --verify --deep --strict --verbose=2 "${{ steps.locate_macos_app.outputs.app_path }}"
          spctl -a -vvv --type exec "${{ steps.locate_macos_app.outputs.app_path }}"
          xcrun stapler validate "${{ steps.locate_macos_app.outputs.app_path }}"

      - name: Cleanup Keychain (macOS)
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
